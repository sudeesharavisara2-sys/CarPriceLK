<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarPriceLK — Vehicle Price Estimator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.5px;
    }
    .header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 12px;
      font-weight: 500;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    select, input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input:focus {
      border-color: #1D9E75;
      background: #fff;
    }

    .slider-group {
      margin-bottom: 12px;
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .slider-label span:first-child {
      font-size: 12px;
      font-weight: 500;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .slider-label span:last-child {
      font-size: 13px;
      font-weight: 600;
      color: #111;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #1D9E75;
      height: 4px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.2rem;
      cursor: pointer;
    }
    .checkbox-row input { width: 16px; height: 16px; accent-color: #1D9E75; cursor: pointer; }
    .checkbox-row span { font-size: 14px; color: #333; }

    button.predict-btn {
      width: 100%;
      padding: 13px;
      background: #1D9E75;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button.predict-btn:hover  { background: #178c65; }
    button.predict-btn:active { transform: scale(0.99); }
    button.predict-btn:disabled { background: #aaa; cursor: not-allowed; }

    /* ── Result ── */
    #result { margin-top: 1rem; }

    .result-card {
      background: #f0faf5;
      border: 1px solid #b3e6d0;
      border-radius: 12px;
      padding: 1.25rem;
    }
    .result-label {
      font-size: 12px;
      color: #4a9e7a;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }
    .result-price {
      font-size: 32px;
      font-weight: 700;
      color: #0F6E56;
      letter-spacing: -1px;
    }
    .result-range {
      font-size: 13px;
      color: #5a9e80;
      margin-top: 3px;
    }
    .verdict-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .verdict-fair   { background: #d1fae5; color: #065f46; }
    .verdict-high   { background: #fef3c7; color: #92400e; }
    .verdict-low    { background: #dbeafe; color: #1e40af; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }
    .detail-item {
      background: #fff;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .detail-item .d-label { font-size: 11px; color: #888; margin-bottom: 2px; }
    .detail-item .d-val   { font-size: 14px; font-weight: 600; color: #111; }

    .factors {
      margin-top: 12px;
      padding: 10px 14px;
      background: #fff;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }

    .error-card {
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 1rem;
      color: #b91c1c;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 1.5rem;
      color: #888;
      font-size: 14px;
    }
    .dot-loader span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #1D9E75;
      margin: 0 2px;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot-loader span:nth-child(2) { animation-delay: .2s; }
    .dot-loader span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

    .accuracy-note {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      margin-top: 0.75rem;
    }

    @media (max-width: 420px) {
      .form-grid { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🚗 CarPriceLK</h1>
    <p>Sri Lanka vehicle market value estimator</p>
  </div>

  <div class="card">

    <div class="form-grid">
      <div class="form-group">
        <label>Make</label>
        <select id="make" onchange="updateModels()">
          <option value="">-- select --</option>
          <option>Toyota</option>
          <option>Suzuki</option>
          <option>Honda</option>
          <option>Nissan</option>
          <option>Mitsubishi</option>
          <option>Hyundai</option>
          <option>Perodua</option>
        </select>
      </div>
      <div class="form-group">
        <label>Model</label>
        <select id="model">
          <option value="">-- select make --</option>
        </select>
      </div>
    </div>

    <div class="slider-group">
      <div class="slider-label">
        <span>Year</span>
        <span id="year-val">2015</span>
      </div>
      <input type="range" id="year" min="2003" max="2024" value="2015" step="1"
        oninput="document.getElementById('year-val').textContent=this.value">
    </div>

    <div class="slider-group">
      <div class="slider-label">
        <span>Mileage</span>
        <span id="mil-val">80,000 km</span>
      </div>
      <input type="range" id="mileage" min="5000" max="250000" value="80000" step="1000"
        oninput="document.getElementById('mil-val').textContent=Number(this.value).toLocaleString()+' km'">
    </div>

    <label class="checkbox-row">
      <input type="checkbox" id="colombo">
      <span>Colombo district</span>
    </label>

    <button class="predict-btn" onclick="predict()">Get market value</button>

    <div id="result"></div>
    <p class="accuracy-note">Trained on 1,571 riyasewana.com listings · R² 0.958 · ±Rs.392,640 avg error</p>
  </div>

</div>

<script>
const MODELS = {
  Toyota:['Allion','Axio','Camry','Corolla','Hilux','Premio','Prius','Rav4','Vit'],
  Suzuki:['Alto','Swift','WagonR'],
  Honda:['Crv','Fit','Grace','Vezel'],
  Nissan:['March','Sunny','Xtrail'],
  Mitsubishi:['Lancer'],
  Hyundai:['Elantra'],
  Perodua:['Axia','Bezza'],
};

const MODEL_DISPLAY = {
  'Vit':'Vitz','Crv':'CR-V','Rav4':'RAV4','Xtrail':'X-Trail',
};

function updateModels() {
  const make = document.getElementById('make').value;
  const sel  = document.getElementById('model');
  if (!make) {
    sel.innerHTML = '<option value="">-- select make --</option>';
    return;
  }
  sel.innerHTML = MODELS[make]
    .map(m => `<option value="${m.toLowerCase()}">${MODEL_DISPLAY[m]||m}</option>`)
    .join('');
}

function fmt(n) {
  return 'Rs. ' + Math.round(n / 1000) * 1000;
}

async function predict() {
  const make      = document.getElementById('make').value;
  const model     = document.getElementById('model').value;
  const year      = parseInt(document.getElementById('year').value);
  const mileage   = parseInt(document.getElementById('mileage').value);
  const is_colombo = document.getElementById('colombo').checked;
  const btn       = document.querySelector('.predict-btn');
  const out       = document.getElementById('result');

  if (!make || !model) {
    out.innerHTML = '<div class="error-card">Make සහ Model select කරන්න.</div>';
    return;
  }

  btn.disabled = true;
  out.innerHTML = `<div class="loading"><div class="dot-loader"><span></span><span></span><span></span></div><p style="margin-top:8px">Calculating...</p></div>`;

  try {
    const res = await fetch('http://localhost:5000/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ make, model, year, mileage, is_colombo }),
    });

    const data = await res.json();

    if (data.error) {
      out.innerHTML = `<div class="error-card">Error: ${data.error}</div>`;
      return;
    }

    const verdictClass =
      data.verdict.includes('over') || data.verdict.includes('High') ? 'verdict-high' :
      data.verdict.includes('deal') || data.verdict.includes('Low')  ? 'verdict-low'  :
      'verdict-fair';

    out.innerHTML = `
      <div class="result-card">
        <div class="result-label">Estimated market value</div>
        <div class="result-price">${fmt(data.predicted_price)}</div>
        <div class="result-range">Range: ${fmt(data.range_low)} – ${fmt(data.range_high)}</div>
        <span class="verdict-badge ${verdictClass}">${data.verdict}</span>

        <div class="detail-grid">
          <div class="detail-item">
            <div class="d-label">Car age</div>
            <div class="d-val">${2026 - data.year} years</div>
          </div>
          <div class="detail-item">
            <div class="d-label">Mileage</div>
            <div class="d-val">${data.mileage_km.toLocaleString()} km</div>
          </div>
          <div class="detail-item">
            <div class="d-label">Location</div>
            <div class="d-val">${data.location}</div>
          </div>
          <div class="detail-item">
            <div class="d-label">Model R²</div>
            <div class="d-val">${data.model_r2}</div>
          </div>
        </div>
      </div>`;

  } catch (e) {
    out.innerHTML = `<div class="error-card">
      <strong>Connection failed.</strong><br>
      Flask server run වෙනවද? Terminal ඇතුළේ:<br>
      <code style="background:#fee;padding:4px 8px;border-radius:4px;margin-top:6px;display:inline-block;">python app.py</code>
    </div>`;
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
